@if (toast.toasts().length) {
  <div class="toast-host">
    @for (item of toast.toasts(); track item.id) {
      <div class="toast-card shadow-lg" [ngClass]="'toast-' + item.type" role="status" aria-live="polite">
        <div class="toast-card__body">
          <div class="toast-card__icon">
            <i
              class="bi"
              [ngClass]="{
                'bi-check-circle-fill': item.type === 'success',
                'bi-x-octagon-fill': item.type === 'danger',
                'bi-exclamation-triangle-fill': item.type === 'warning',
                'bi-info-circle-fill': item.type === 'info'
              }"
            ></i>
          </div>
          <div class="toast-card__text">{{ item.text }}</div>
          <button type="button" class="toast-card__close" aria-label="Cerrar" (click)="toast.dismiss(item.id)">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
      </div>
    }
  </div>
}
