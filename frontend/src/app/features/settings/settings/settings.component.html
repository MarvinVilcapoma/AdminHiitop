<div class="page-header">
  <h1><i class="bi bi-gear me-2 text-primary"></i>Configuración</h1>
</div>

<p class="text-muted mb-4">Catálogos y parámetros del sistema.</p>

<div class="row g-3">
  @for (item of configItems; track item.path) {
    <div class="col-sm-6 col-lg-4">
      <a [routerLink]="item.path" class="config-card text-decoration-none">
        <i class="bi {{ item.icon }} config-icon"></i>
        <h3 class="fs-6 fw-semibold mb-1 mt-2">{{ item.title }}</h3>
        <p class="text-muted small mb-0">{{ item.description }}</p>
      </a>
    </div>
  }
</div>
