# Hiitop - API (api-hiitop), Frontend (front-hiitop), MySQL (hiitop-db)
# Docker es gratuito para uso personal y en empresas pequeñas (Docker Desktop).
# Ejecutar: docker compose up -d
# API: http://localhost:8050  |  Front: http://localhost:4200

services:
  api-hiitop:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: api-hiitop
    container_name: api_hiitop_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./api:/var/www
      - api_hiitop_vendor:/var/www/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - CACHE_DRIVER=array
      - DB_CONNECTION=mysql
      - DB_HOST=hiitop-db
      - DB_PORT=3306
      - DB_DATABASE=hiitop
      - DB_USERNAME=hiitop
      - DB_PASSWORD=hiitop_secret
    networks:
      - hiitop_network
    depends_on:
      hiitop-db:
        condition: service_healthy

  nginx-hiitop:
    image: nginx:stable-alpine
    container_name: api_hiitop_nginx
    restart: unless-stopped
    ports:
      - "8051:80"
    volumes:
      - ./api/public:/var/www/public:ro
      - ./api/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hiitop_network
    depends_on:
      - api-hiitop

  hiitop-db:
    image: mysql:8.0
    container_name: hiitop_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: hiitop
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_USER: hiitop
      MYSQL_PASSWORD: hiitop_secret
    volumes:
      - hiitop_db_data:/var/lib/mysql
    ports:
      - "3310:3306"
    networks:
      - hiitop_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_secret"]
      timeout: 20s
      retries: 10
      start_period: 30s
      interval: 10s

  front-hiitop:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: front-hiitop
    container_name: front_hiitop_app
    mem_limit: 4g
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - NODE_OPTIONS=--max_old_space_size=8192
    networks:
      - hiitop_network
    command: ng serve --host 0.0.0.0 --poll=2000

networks:
  hiitop_network:
    driver: bridge

volumes:
  hiitop_db_data:
    driver: local
  api_hiitop_vendor:
    driver: local
